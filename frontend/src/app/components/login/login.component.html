<div class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md">

    <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">Bienvenido</h1>
    <p class="text-center text-gray-500 text-sm mb-6">Ingresa tus credenciales para continuar</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Usuario o correo</label>
        <input
          type="text"
          formControlName="username"
          placeholder="Ingresa tu usuario o correo"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <span
          *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
          class="text-red-500 text-xs mt-1 block">
          Este campo es obligatorio
        </span>
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input
          type="password"
          formControlName="password"
          placeholder="Ingresa tu contraseña"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <span
          *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          class="text-red-500 text-xs mt-1 block">
          Este campo es obligatorio
        </span>
      </div>

      <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-100 text-red-600 rounded-lg text-sm text-center">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition disabled:opacity-50">
        {{ loading ? 'Ingresando...' : 'Ingresar' }}
      </button>
<p class="text-center text-sm text-gray-500 mt-4">
  ¿No tienes cuenta?
  <a routerLink="/register" class="text-blue-600 hover:underline font-medium">Regístrate</a>
</p>
    </form>
  </div>
</div>
